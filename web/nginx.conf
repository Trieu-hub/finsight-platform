server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: unknown paths fall back to index.html so React Router can
    # resolve them client-side (a hard refresh on /wallets must not 404).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Fingerprinted assets are immutable — cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
