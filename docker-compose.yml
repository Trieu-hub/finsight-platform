# FinSight platform stack.
#
# Topology notes (derived from the services' actual config):
#   * Three services are MySQL-backed (auth_db, transaction_db, budget_db) and one
#     (user-service) is PostgreSQL-backed (user_db) — so the stack runs BOTH engines.
#   * Services do NOT call each other at runtime. The only coupling is the shared
#     HMAC JWT secret: auth-service issues tokens; user/transaction/budget validate
#     them locally with the same secret. Hence every service depends only on its own
#     datastore, never on another service.
#   * All four services read the same externalized config contract
#     (${DB_URL}/${DB_USERNAME}/${DB_PASSWORD}, ${REDIS_HOST}/${REDIS_PORT}, ${JWT_SECRET}),
#     so each is configured purely through environment variables here.

x-jwt-secret: &jwt-secret "finSight-auth-service-dev-secret-key-must-be-at-least-256-bits-long"

services:
  mysql:
    image: mysql:8.4
    container_name: finsight-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
    # DB ports are intentionally NOT published to the host: the services reach the
    # database over the compose network, and publishing 3306 collides with a
    # locally-run MySQL (which the services' own localhost defaults assume exists).
    # To inspect from the host, add e.g. `ports: ["13306:3306"]`.
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:16
    container_name: finsight-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_db
    # Not published to the host (see mysql note); add `ports: ["15432:5432"]` to inspect.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: finsight-redis
    # Not published to the host (see mysql note); add `ports: ["16379:6379"]` to inspect.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-service:
    build: ./services/auth-service
    container_name: finsight-auth-service
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/auth_db
      DB_USERNAME: root
      DB_PASSWORD: "123456"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_SECRET: *jwt-secret
    ports:
      - "8081:8081"
    restart: unless-stopped

  user-service:
    build: ./services/user-service
    container_name: finsight-user-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/user_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: *jwt-secret
    ports:
      - "8082:8082"
    restart: unless-stopped

  transaction-service:
    build: ./services/transaction-service
    container_name: finsight-transaction-service
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/transaction_db
      DB_USERNAME: root
      DB_PASSWORD: "123456"
      JWT_SECRET: *jwt-secret
    ports:
      - "8083:8083"
    restart: unless-stopped

  budget-service:
    build: ./services/budget-service
    container_name: finsight-budget-service
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/budget_db
      DB_USERNAME: root
      DB_PASSWORD: "123456"
      JWT_SECRET: *jwt-secret
    ports:
      - "8084:8084"
    restart: unless-stopped

  # API Gateway — V1 Phase 1 (routing-only edge).
  # Forwards by path prefix to the four services over the compose network. It does
  # NOT authenticate yet (added in a later phase). The backend services still publish
  # their host ports in this phase; the perimeter cutover (un-publishing them) is a
  # later phase, keeping the gateway removable without service changes for now.
  api-gateway:
    build: ./services/api-gateway
    container_name: finsight-api-gateway
    depends_on:
      - auth-service
      - user-service
      - transaction-service
      - budget-service
    environment:
      AUTH_SERVICE_URI: http://auth-service:8081
      USER_SERVICE_URI: http://user-service:8082
      TRANSACTION_SERVICE_URI: http://transaction-service:8083
      BUDGET_SERVICE_URI: http://budget-service:8084
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  mysql_data:
  postgres_data:
