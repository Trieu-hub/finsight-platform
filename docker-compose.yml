# FinSight platform stack.
#
# Topology notes (derived from the services' actual config):
#   * All four services are MySQL-backed (auth_db, user_db, transaction_db, budget_db)
#     on a single shared MySQL 8 instance. (user-service was consolidated off its own
#     PostgreSQL instance onto MySQL to match the rest of the platform.)
#   * Services do NOT call each other at runtime. The only coupling is the shared
#     HMAC JWT secret: auth-service issues tokens; user/transaction/budget validate
#     them locally with the same secret. Hence every service depends only on its own
#     datastore, never on another service.
#   * All four services read the same externalized config contract
#     (${DB_URL}/${DB_USERNAME}/${DB_PASSWORD}, ${REDIS_HOST}/${REDIS_PORT}, ${JWT_SECRET}),
#     so each is configured purely through environment variables here.
#   * Secrets are NOT in this file. They are interpolated from a gitignored `.env`
#     (copy `.env.example` -> `.env`). Each service authenticates to MySQL as its own
#     least-privilege user (auth_user/user_user/transaction_user/budget_user), never root.

services:
  mysql:
    image: mysql:8.4
    container_name: finsight-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
      # Passed through so 02-create-app-users.sh can provision per-service users at
      # first init. Root itself is used only for admin/init, never by the services.
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD:?set AUTH_DB_PASSWORD in .env}
      USER_DB_PASSWORD: ${USER_DB_PASSWORD:?set USER_DB_PASSWORD in .env}
      TRANSACTION_DB_PASSWORD: ${TRANSACTION_DB_PASSWORD:?set TRANSACTION_DB_PASSWORD in .env}
      BUDGET_DB_PASSWORD: ${BUDGET_DB_PASSWORD:?set BUDGET_DB_PASSWORD in .env}
    # DB ports are intentionally NOT published to the host: the services reach the
    # database over the compose network, and publishing 3306 collides with a
    # locally-run MySQL (which the services' own localhost defaults assume exists).
    # To inspect from the host, add e.g. `ports: ["13306:3306"]`.
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: finsight-redis
    # Not published to the host (see mysql note); add `ports: ["16379:6379"]` to inspect.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Kafka — single-node KRaft broker (no Zookeeper). The async event backbone
  # (Phase 2.1): transaction-service publishes TransactionCreated here. Listener
  # 'PLAINTEXT' is for in-network clients (advertised as kafka:9092); 'CONTROLLER'
  # is the KRaft quorum. Single broker => replication factor 1 (see KAFKA env).
  kafka:
    image: apache/kafka:3.9.1
    container_name: finsight-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Single-node: every internal topic must fit on one broker.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    # Not published to the host (see mysql note); add `ports: ["19092:9092"]` plus an
    # extra advertised listener to inspect from the host.
    healthcheck:
      # Broker is ready once the API responds to a topic listing over the bootstrap port.
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  auth-service:
    build: ./services/auth-service
    container_name: finsight-auth-service
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/auth_db
      DB_USERNAME: auth_user
      DB_PASSWORD: ${AUTH_DB_PASSWORD:?set AUTH_DB_PASSWORD in .env}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
    ports:
      - "8081:8081"
    restart: unless-stopped
    healthcheck:
      # "healthy" == Actuator readiness is UP (process up AND DB+Redis reachable).
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

  user-service:
    build: ./services/user-service
    container_name: finsight-user-service
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/user_db
      DB_USERNAME: user_user
      DB_PASSWORD: ${USER_DB_PASSWORD:?set USER_DB_PASSWORD in .env}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
    ports:
      - "8082:8082"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8082/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

  transaction-service:
    build: ./services/transaction-service
    container_name: finsight-transaction-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/transaction_db
      DB_USERNAME: transaction_user
      DB_PASSWORD: ${TRANSACTION_DB_PASSWORD:?set TRANSACTION_DB_PASSWORD in .env}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      # Async event backbone: where TransactionCreated is published (Phase 2.1).
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # Native Spring Boot 4 structured logging: emit ECS-formatted JSON to stdout for
      # log aggregation (ELK/OpenSearch/Loki-ready). Bound to logging.structured.format.console
      # via relaxed binding; service.name comes from spring.application.name and MDC
      # (correlationId) is included automatically. Unset (local/CI) => unchanged plain text.
      LOGGING_STRUCTURED_FORMAT_CONSOLE: ecs
    ports:
      - "8083:8083"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8083/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

  budget-service:
    build: ./services/budget-service
    container_name: finsight-budget-service
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/budget_db
      DB_USERNAME: budget_user
      DB_PASSWORD: ${BUDGET_DB_PASSWORD:?set BUDGET_DB_PASSWORD in .env}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
    ports:
      - "8084:8084"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8084/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

  # Dashboard Service — read-only aggregation layer / BFF.
  # Owns NO database. It calls user/transaction/budget directly over the compose
  # network and relays the caller's JWT (each upstream validates it). It validates the
  # JWT locally too (service-level validation is never removed). See docs/ADR-0003.
  dashboard-service:
    build: ./services/dashboard-service
    container_name: finsight-dashboard-service
    # Wait until every upstream it aggregates is actually ready, not merely started.
    depends_on:
      user-service:
        condition: service_healthy
      transaction-service:
        condition: service_healthy
      budget-service:
        condition: service_healthy
    environment:
      USER_SERVICE_URI: http://user-service:8082
      TRANSACTION_SERVICE_URI: http://transaction-service:8083
      BUDGET_SERVICE_URI: http://budget-service:8084
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      # Native Spring Boot 4 structured logging: emit ECS-formatted JSON to stdout for
      # log aggregation (ELK/OpenSearch/Loki-ready). Bound to logging.structured.format.console
      # via relaxed binding; service.name comes from spring.application.name and MDC
      # (correlationId) is included automatically. Unset (local/CI) => unchanged plain text.
      LOGGING_STRUCTURED_FORMAT_CONSOLE: ecs
    ports:
      - "8085:8085"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8085/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

  # API Gateway — V1 Phase 2 (routing + edge JWT authentication).
  # Forwards by path prefix to the four services over the compose network, and now
  # validates the access token at the edge (signature/HS512/issuer/audience) on every
  # non-public route, forwarding the bearer token downstream. The backend services
  # still publish their host ports and still validate tokens themselves; the perimeter
  # cutover (un-publishing them) is a later phase, keeping the gateway removable.
  api-gateway:
    build: ./services/api-gateway
    container_name: finsight-api-gateway
    # The edge comes up only after the whole platform behind it is ready, so the
    # first request through the gateway cannot hit an unready downstream.
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      transaction-service:
        condition: service_healthy
      budget-service:
        condition: service_healthy
      dashboard-service:
        condition: service_healthy
    environment:
      AUTH_SERVICE_URI: http://auth-service:8081
      USER_SERVICE_URI: http://user-service:8082
      TRANSACTION_SERVICE_URI: http://transaction-service:8083
      BUDGET_SERVICE_URI: http://budget-service:8084
      DASHBOARD_SERVICE_URI: http://dashboard-service:8085
      # Phase 2: the gateway validates the access token at the edge with the same
      # shared HMAC secret auth-service signs with (issuer/audience default to the
      # minted values). See docs/ADR-0002.
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      # Native Spring Boot 4 structured logging: emit ECS-formatted JSON to stdout for
      # log aggregation (ELK/OpenSearch/Loki-ready). Bound to logging.structured.format.console
      # via relaxed binding; service.name comes from spring.application.name and MDC
      # (correlationId) is included automatically. Unset (local/CI) => unchanged plain text.
      LOGGING_STRUCTURED_FORMAT_CONSOLE: ecs
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

volumes:
  mysql_data:
