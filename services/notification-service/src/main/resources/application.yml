server:
  port: 8087

spring:
  application:
    name: notification-service

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/notification_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        # MySQL8Dialect was removed in Hibernate 7; MySQLDialect auto-detects 8.x.
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      # One consumer group for the service; offsets track which RiskDetected events
      # have already been turned into notifications.
      group-id: notification-service
      # First deploy starts from the beginning of the topic, not only new events.
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # Wrap the JSON deserializer so a malformed payload becomes a handled error
      # (DefaultErrorHandler: retry, then log-and-skip) instead of an infinite
      # redelivery loop pinning the partition.
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        # The producer (risk-service) deliberately omits Java type headers (language-neutral
        # wire format), so the target type must be declared here.
        spring.json.value.default.type: com.pm.notificationservice.event.RiskDetectedEvent
        spring.json.use.type.headers: false
        spring.json.trusted.packages: com.pm.notificationservice.event

finsight:
  kafka:
    # Master switch for event consumption. Off => no listener container starts (used by
    # the default test profile, which has no broker).
    enabled: true
    topics:
      # Consumed: owned by risk-service. notification-service is the first consumer of
      # this topic — it turns each detected risk into a user-facing in-app notification.
      risk-detected: finsight.risk.detected

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
    jmx:
      exposure:
        exclude: "*"
  metrics:
    distribution:
      # Publish latency histogram buckets so Grafana can compute p95/p99 with
      # histogram_quantile(); without buckets only averages are possible.
      percentiles-histogram:
        http.server.requests: true
  endpoint:
    health:
      show-details: never
      show-components: never
      # Expose /actuator/health/liveness and /actuator/health/readiness (generic
      # Spring Boot probe support, not Kubernetes-specific).
      probes:
        enabled: true
      group:
        # Liveness must not depend on the DB (a DB blip should not restart us).
        liveness:
          include: livenessState
        # Readiness is DOWN until the database is reachable.
        readiness:
          include: readinessState,db
    info:
      enabled: true
  info:
    env:
      enabled: false

jwt:
  secret: ${JWT_SECRET}
  # Enforced on validation (parity with the gateway and the minting auth-service).
  issuer: ${JWT_ISSUER:finsight-auth}
  audience: ${JWT_AUDIENCE:finsight-api}
