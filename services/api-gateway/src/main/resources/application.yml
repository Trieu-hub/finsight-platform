server:
  port: 8080

spring:
  application:
    name: api-gateway

# Routing-only edge (Phase 1). Targets default to localhost for local runs and are
# overridden to compose service hostnames via env vars in docker-compose.yml.
gateway:
  routes:
    - prefix: /api/v1/auth
      uri: ${AUTH_SERVICE_URI:http://localhost:8081}
    - prefix: /api/v1/users
      uri: ${USER_SERVICE_URI:http://localhost:8082}
    - prefix: /api/v1/transactions
      uri: ${TRANSACTION_SERVICE_URI:http://localhost:8083}
    - prefix: /api/v1/categories
      uri: ${TRANSACTION_SERVICE_URI:http://localhost:8083}
    - prefix: /api/v1/wallets
      uri: ${TRANSACTION_SERVICE_URI:http://localhost:8083}
    - prefix: /api/v1/budgets
      uri: ${BUDGET_SERVICE_URI:http://localhost:8084}
    - prefix: /api/v1/dashboard
      uri: ${DASHBOARD_SERVICE_URI:http://localhost:8085}
    - prefix: /api/v1/notifications
      uri: ${NOTIFICATION_SERVICE_URI:http://localhost:8087}
    - prefix: /api/v1/analytics
      uri: ${ANALYTICS_SERVICE_URI:http://localhost:8088}
  # Routes that bypass edge authentication. Frozen in docs/ADR-0002 §4: the auth entry
  # points that mint/rotate tokens (caller has no access token, or it may be expired).
  # Everything else under /api/v1/** requires a valid token. Matched by exact method+path.
  public-routes:
    - { method: POST, path: /api/v1/auth/register }
    - { method: POST, path: /api/v1/auth/login }
    - { method: POST, path: /api/v1/auth/refresh }
    - { method: POST, path: /api/v1/auth/logout }
  timeouts:
    connect-ms: ${GATEWAY_CONNECT_TIMEOUT_MS:2000}
    read-ms: ${GATEWAY_READ_TIMEOUT_MS:10000}

# Edge JWT validation contract (Phase 2). Frozen in docs/ADR-0002 §1-§3. The secret is
# the same one auth-service signs with; issuer/audience default to the minted values.
jwt:
  secret: ${JWT_SECRET}
  issuer: ${JWT_ISSUER:finsight-auth}
  audience: ${JWT_AUDIENCE:finsight-api}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    distribution:
      # Publish latency histogram buckets so Grafana can compute p95/p99 with
      # histogram_quantile(); without buckets only averages are possible.
      percentiles-histogram:
        http.server.requests: true
  endpoint:
    health:
      show-details: never
      # Expose /actuator/health/liveness and /actuator/health/readiness (generic
      # Spring Boot probe support, not Kubernetes-specific). The gateway owns no
      # datastore, so the default groups apply: liveness=livenessState,
      # readiness=readinessState — readiness deliberately depends on NO external
      # infra, as required.
      probes:
        enabled: true
  # Gateway readiness must NOT depend on any external datastore. No Redis health
  # contributor exists in this phase; keep it that way.
