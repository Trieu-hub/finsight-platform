server:
  port: 8083

spring:
  application:
    name: transaction-service

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/transaction_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        # MySQL8Dialect was removed in Hibernate 7; MySQLDialect auto-detects 8.x.
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      # Durability: wait for all in-sync replicas (no-op at RF=1, correct as we scale).
      acks: all
      properties:
        # Don't stamp the Java class name into headers — keep the payload language-neutral
        # for future (possibly non-JVM) consumers; they deserialize by the documented schema.
        spring.json.add.type.headers: false
        # Bound how long a send() blocks fetching metadata. Since the publish runs
        # AFTER_COMMIT on the request thread, a broker outage must fail fast (logged,
        # not rethrown) rather than stall transaction creation for the 60s default.
        max.block.ms: 10000

finsight:
  kafka:
    # Master switch for event publishing. Off => create() never reaches for a broker.
    enabled: true
    # Topic names this service owns. Externalized so infra/tests can override.
    topics:
      transaction-created: finsight.transactions.created

management:
  endpoints:
    web:
      exposure:
        include: health,info
    jmx:
      exposure:
        exclude: "*"
  endpoint:
    health:
      show-details: never
      show-components: never
      # Expose /actuator/health/liveness and /actuator/health/readiness (generic
      # Spring Boot probe support, not Kubernetes-specific).
      probes:
        enabled: true
      group:
        # Liveness must not depend on the DB (a DB blip should not restart us).
        liveness:
          include: livenessState
        # Readiness is DOWN until the database is reachable.
        readiness:
          include: readinessState,db
    info:
      enabled: true
  info:
    env:
      enabled: false

jwt:
  secret: ${JWT_SECRET}
  # Enforced on validation (parity with the gateway and the minting auth-service).
  issuer: ${JWT_ISSUER:finsight-auth}
  audience: ${JWT_AUDIENCE:finsight-api}
