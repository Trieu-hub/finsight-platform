server:
  port: 8086

spring:
  application:
    name: risk-service

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/risk_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        # MySQL8Dialect was removed in Hibernate 7; MySQLDialect auto-detects 8.x.
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      # One consumer group for the service; offsets track which transactions were evaluated.
      group-id: risk-service
      # First deploy starts from the beginning of the topic, not only new events.
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # Wrap the JSON deserializer so a malformed payload becomes a handled error
      # (DefaultErrorHandler: retry, then log-and-skip) instead of an infinite
      # redelivery loop pinning the partition.
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        # The producer omits Java type headers (language-neutral wire format), so the
        # target type must be declared here.
        spring.json.value.default.type: com.pm.riskservice.event.TransactionCreatedEvent
        spring.json.use.type.headers: false
        spring.json.trusted.packages: com.pm.riskservice.event
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      # Durability: wait for all in-sync replicas (no-op at RF=1, correct as we scale).
      acks: all
      properties:
        # Keep the payload language-neutral — consumers deserialize by the documented schema.
        spring.json.add.type.headers: false
        # Bound how long a send() blocks fetching metadata so a broker blip fails fast.
        max.block.ms: 10000

finsight:
  kafka:
    # Master switch for event consumption/production. Off => no listener starts, no
    # broker needed (the default in the test profile).
    enabled: true
    topics:
      # Owned by transaction-service; consumed here.
      transaction-created: finsight.transactions.created
      # Owned by budget-service; consumed here for the BUDGET_RISK read-model (Phase E.2).
      budget-changed: finsight.budgets.changed
      # Owned by this service; produced here.
      risk-detected: finsight.risk.detected

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
    jmx:
      exposure:
        exclude: "*"
  endpoint:
    health:
      show-details: never
      show-components: never
      # Expose /actuator/health/liveness and /actuator/health/readiness.
      probes:
        enabled: true
      group:
        # Liveness must not depend on the DB (a DB blip should not restart us).
        liveness:
          include: livenessState
        # Readiness is DOWN until the database is reachable.
        readiness:
          include: readinessState,db
    info:
      enabled: true
  info:
    env:
      enabled: false
