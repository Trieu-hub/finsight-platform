server:
  port: 8084

spring:
  application:
    name: budget-service

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/budget_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        # MySQL8Dialect was removed in Hibernate 7; MySQLDialect auto-detects 8.x.
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
    jmx:
      exposure:
        exclude: "*"
  endpoint:
    health:
      show-details: never
      show-components: never
      # Expose /actuator/health/liveness and /actuator/health/readiness (generic
      # Spring Boot probe support, not Kubernetes-specific).
      probes:
        enabled: true
      group:
        # Liveness must not depend on the DB (a DB blip should not restart us).
        liveness:
          include: livenessState
        # Readiness is DOWN until the database is reachable.
        readiness:
          include: readinessState,db
    info:
      enabled: true
  info:
    env:
      enabled: false

jwt:
  secret: ${JWT_SECRET}
  # Enforced on validation (parity with the gateway and the minting auth-service).
  issuer: ${JWT_ISSUER:finsight-auth}
  audience: ${JWT_AUDIENCE:finsight-api}
