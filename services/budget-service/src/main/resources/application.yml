server:
  port: 8084

spring:
  application:
    name: budget-service

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/budget_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        # MySQL8Dialect was removed in Hibernate 7; MySQLDialect auto-detects 8.x.
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      # One consumer group for the service; offsets track what budgets have absorbed.
      group-id: budget-service
      # First deploy starts from the beginning of the topic, not only new events.
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # Wrap the JSON deserializer so a malformed payload becomes a handled error
      # (DefaultErrorHandler: retry, then log-and-skip) instead of an infinite
      # redelivery loop pinning the partition.
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        # The producer deliberately omits Java type headers (language-neutral wire
        # format), so the target type must be declared here.
        spring.json.value.default.type: com.pm.budgetservice.event.TransactionCreatedEvent
        spring.json.use.type.headers: false
        spring.json.trusted.packages: com.pm.budgetservice.event

finsight:
  kafka:
    # Master switch for event consumption (mirrors the producer-side flag in
    # transaction-service). Off => no listener container starts, no broker needed.
    enabled: true
    # Topic names this service consumes. Owned by transaction-service; externalized
    # so infra/tests can override.
    topics:
      transaction-created: finsight.transactions.created

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
    jmx:
      exposure:
        exclude: "*"
  metrics:
    distribution:
      # Publish latency histogram buckets so Grafana can compute p95/p99 with
      # histogram_quantile(); without buckets only averages are possible.
      percentiles-histogram:
        http.server.requests: true
  endpoint:
    health:
      show-details: never
      show-components: never
      # Expose /actuator/health/liveness and /actuator/health/readiness (generic
      # Spring Boot probe support, not Kubernetes-specific).
      probes:
        enabled: true
      group:
        # Liveness must not depend on the DB (a DB blip should not restart us).
        liveness:
          include: livenessState
        # Readiness is DOWN until the database is reachable.
        readiness:
          include: readinessState,db
    info:
      enabled: true
  info:
    env:
      enabled: false

jwt:
  secret: ${JWT_SECRET}
  # Enforced on validation (parity with the gateway and the minting auth-service).
  issuer: ${JWT_ISSUER:finsight-auth}
  audience: ${JWT_AUDIENCE:finsight-api}
