server:
  port: 8085

spring:
  application:
    name: dashboard-service

# Read-only aggregation layer (BFF). Owns NO database. It calls the Transaction,
# Budget and User services directly over the network and relays the caller's JWT so
# each upstream authorizes as the same user (see docs/ADR-0003).
dashboard:
  services:
    user-uri: ${USER_SERVICE_URI:http://localhost:8082}
    transaction-uri: ${TRANSACTION_SERVICE_URI:http://localhost:8083}
    budget-uri: ${BUDGET_SERVICE_URI:http://localhost:8084}
  timeouts:
    connect-ms: ${DASHBOARD_CONNECT_TIMEOUT_MS:2000}
    read-ms: ${DASHBOARD_READ_TIMEOUT_MS:5000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
    jmx:
      exposure:
        exclude: "*"
  endpoint:
    health:
      show-details: never
      show-components: never
      # Expose /actuator/health/liveness and /actuator/health/readiness (generic
      # Spring Boot probe support, not Kubernetes-specific). The BFF owns no
      # datastore; readiness uses the default readinessState and is intentionally
      # decoupled from upstream service health (request-time fail-fast handles that).
      probes:
        enabled: true
    info:
      enabled: true
  info:
    env:
      enabled: false

# Same shared HMAC secret auth-service signs with; validated locally on every request.
jwt:
  secret: ${JWT_SECRET}
  # Enforced on validation (parity with the gateway and the minting auth-service).
  issuer: ${JWT_ISSUER:finsight-auth}
  audience: ${JWT_AUDIENCE:finsight-api}
