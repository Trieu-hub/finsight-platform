server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:mysql://localhost:3306/auth_db
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
    jmx:
      exposure:
        exclude: "*"
  endpoint:
    health:
      show-details: never
      show-components: never
    info:
      enabled: true
  info:
    env:
      enabled: false
  health:
    redis:
      enabled: false

jwt:
  secret: finSight-auth-service-dev-secret-key-must-be-at-least-256-bits-long
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

