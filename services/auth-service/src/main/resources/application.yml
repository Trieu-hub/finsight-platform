server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:mysql://localhost:3306/auth_db
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

management:
  health:
    redis:
      enabled: false

jwt:
  secret: finSight-auth-service-dev-secret-key-must-be-at-least-256-bits-long
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

