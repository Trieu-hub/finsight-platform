server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/auth_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # Fail fast instead of blocking a login thread indefinitely when Redis is unreachable.
      timeout: 2s
      connect-timeout: 2s

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
    jmx:
      exposure:
        exclude: "*"
  endpoint:
    health:
      show-details: never
      show-components: never
      # Expose /actuator/health/liveness and /actuator/health/readiness (not
      # Kubernetes-specific; this is Spring Boot's generic probe support).
      probes:
        enabled: true
      group:
        # Liveness = "process is healthy"; must NOT depend on external infra,
        # otherwise a DB/Redis blip would cause needless restarts.
        liveness:
          include: livenessState
        # Readiness = "can serve traffic"; DOWN until DB and Redis are reachable
        # so an orchestrator stops sending requests this node cannot serve.
        readiness:
          include: readinessState,db,redis
    info:
      enabled: true
  info:
    env:
      enabled: false
  health:
    redis:
      # Redis backs refresh-token issuance; surface its outage in readiness so an
      # orchestrator stops routing login traffic to a node that cannot issue tokens.
      enabled: true

jwt:
  # No default: the app must be given a secret (shared with the other services).
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:900000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}
  # Emitted into issued tokens and logged on validation, but NOT enforced yet.
  issuer: ${JWT_ISSUER:finsight-auth}
  audience: ${JWT_AUDIENCE:finsight-api}

security:
  login:
    # Per-account brute-force guard (LoginAttemptService). Edge/IP throttling is
    # intentionally left to the future API Gateway, not duplicated here.
    max-attempts: ${LOGIN_MAX_ATTEMPTS:5}
    attempt-window: ${LOGIN_ATTEMPT_WINDOW:15m}
    lock-duration: ${LOGIN_LOCK_DURATION:15m}

