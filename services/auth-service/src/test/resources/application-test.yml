# Test profile. The datasource and Redis connection are injected dynamically from
# Testcontainers (see AbstractIntegrationTest), so only non-infra settings live here.
spring:
  jpa:
    hibernate:
      # Schema is owned by Flyway; Hibernate only validates it against the entities.
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true

# Dummy HMAC secret (>= 256 bits) so JwtService can build a signing key in tests.
jwt:
  secret: test-secret-test-secret-test-secret-test-secret-0123456789abcdef
  access-token-expiration: 900000
  refresh-token-expiration: 604800000
  issuer: finsight-auth
  audience: finsight-api

# Low threshold so lockout tests trigger quickly; windows long enough to stay
# locked for the duration of a fast test.
security:
  login:
    max-attempts: 3
    attempt-window: 2m
    lock-duration: 2m
