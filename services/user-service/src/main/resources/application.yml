server:
  port: 8082

spring:
  application:
    name: user-service

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/user_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        # MySQL8Dialect was removed in Hibernate 7; MySQLDialect auto-detects 8.x.
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
    jmx:
      exposure:
        exclude: "*"
  endpoint:
    health:
      show-details: never
      show-components: never
    info:
      enabled: true
  info:
    env:
      enabled: false

jwt:
  secret: ${JWT_SECRET}
